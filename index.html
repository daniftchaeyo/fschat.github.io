<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PingWave Chat</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
font-family: Arial;
max-width:600px;
margin:auto;
}

#chat{
border:1px solid #ccc;
height:350px;
overflow-y:auto;
padding:10px;
background:#f5f5f5;
}

.mensaje{
margin:5px 0;
}

.usuario{
font-weight:bold;
color:#2b7cff;
}

input{
padding:6px;
margin-top:5px;
}
</style>

</head>
<body>

<h2>PingWave Chat</h2>

<input id="usuario" placeholder="Tu nombre">

<div id="chat"></div>

<input id="mensaje" placeholder="Escribe un mensaje..." style="width:80%">
<button onclick="enviar()">Enviar</button>

<script>

const broker = 'wss://broker.hivemq.com:8884/mqtt'
const topic = 'pingwave/chat/global'

const client = mqtt.connect(broker)

const chat = document.getElementById("chat")

client.on('connect', ()=>{
    agregarSistema("Conectado al servidor")
    client.subscribe(topic)
})

client.on('message',(topic,message)=>{

    const data = JSON.parse(message.toString())

    chat.innerHTML += `
    <div class="mensaje">
        <span class="usuario">${data.usuario}:</span>
        ${data.texto}
    </div>
    `

    chat.scrollTop = chat.scrollHeight
})

function enviar(){

    const usuario = document.getElementById("usuario").value
    const texto = document.getElementById("mensaje").value

    if(usuario=="" || texto=="") return

    const mensaje = {
        usuario: usuario,
        texto: texto
    }

    client.publish(topic,JSON.stringify(mensaje))

    document.getElementById("mensaje").value=""
}

function agregarSistema(texto){
chat.innerHTML += `<p><i>${texto}</i></p>`
}

</script>

</body>
</html>
    </script>
</body>
</html>
