<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PingWave Chat</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fb, #e9eef7);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 820px;
      height: 88vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .header {
      background: #ffffff;
      border-bottom: 1px solid #eceff3;
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 30px;
      font-weight: 700;
      color: #111827;
    }

    .estado {
      font-size: 14px;
      color: #16a34a;
      font-weight: 600;
    }

    .topbar {
      padding: 16px 24px;
      background: #f9fafb;
      border-bottom: 1px solid #eceff3;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar input {
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      font-size: 15px;
      outline: none;
      background: #ffffff;
      color: #111827;
    }

    #nombreInput {
      width: 240px;
    }

    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: linear-gradient(to bottom, #f9fbff, #f3f6fb);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sistema {
      align-self: center;
      background: #eef2ff;
      color: #4f46e5;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #c7d2fe;
    }

    .mensaje {
      max-width: 75%;
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    .mensaje.otro {
      align-self: flex-start;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      color: #111827;
      border-bottom-left-radius: 6px;
    }

    .mensaje.mio {
      align-self: flex-end;
      background: #111827;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }

    .usuario {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      opacity: 0.8;
    }

    .hora {
      display: block;
      font-size: 11px;
      margin-top: 8px;
      opacity: 0.7;
      text-align: right;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 18px 24px;
      background: #ffffff;
      border-top: 1px solid #eceff3;
    }

    #mensajeInput {
      flex: 1;
      padding: 16px 18px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      outline: none;
      font-size: 15px;
      background: #f9fafb;
    }

    #mensajeInput:focus,
    #nombreInput:focus {
      border-color: #111827;
    }

    button {
      background: #111827;
      color: #ffffff;
      border: none;
      border-radius: 16px;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #374151;
    }

    @media (max-width: 700px) {
      .app {
        height: 94vh;
        border-radius: 18px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }

      .header h1 {
        font-size: 24px;
      }

      .topbar {
        flex-direction: column;
      }

      #nombreInput {
        width: 100%;
      }

      .input-area {
        flex-direction: column;
      }

      button {
        height: 52px;
      }

      .mensaje {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>PingWave Chat</h1>
      <div class="estado" id="estadoConexion">● Conectando...</div>
    </div>

    <div class="topbar">
      <input type="text" id="nombreInput" placeholder="Escribe tu nombre" />
    </div>

    <div id="mensajes">
      <div class="sistema">Bienvenido al chat</div>
    </div>

    <div class="input-area">
      <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." />
      <button onclick="enviarMensaje()">Enviar</button>
    </div>
  </div>

  <script>
    const brokerUrl = "wss://broker.hivemq.com:8884/mqtt";
    const topic = "pingwave/chat/sala1";

    const client = mqtt.connect(brokerUrl);
    const mensajes = document.getElementById("mensajes");
    const estadoConexion = document.getElementById("estadoConexion");

    client.on("connect", () => {
      estadoConexion.textContent = "● Conectado";
      agregarSistema("Conectado al servidor MQTT");
      client.subscribe(topic);
    });

    client.on("error", () => {
      estadoConexion.textContent = "● Error de conexión";
    });

    client.on("message", (topic, message) => {
      try {
        const data = JSON.parse(message.toString());
        const miNombre = document.getElementById("nombreInput").value.trim();
        const esMio = data.usuario === miNombre;
        agregarMensaje(data.usuario, data.texto, esMio, data.hora);
      } catch (e) {
        agregarMensaje("Usuario", message.toString(), false, obtenerHoraActual());
      }
    });

    function enviarMensaje() {
      const nombre = document.getElementById("nombreInput").value.trim();
      const mensajeInput = document.getElementById("mensajeInput");
      const texto = mensajeInput.value.trim();

      if (nombre === "") {
        alert("Primero escribe tu nombre");
        return;
      }

      if (texto === "") return;

      const payload = {
        usuario: nombre,
        texto: texto,
        hora: obtenerHoraActual()
      };

      client.publish(topic, JSON.stringify(payload));
      mensajeInput.value = "";
    }

    function agregarMensaje(usuario, texto, esMio, hora) {
      const div = document.createElement("div");
      div.className = `mensaje ${esMio ? "mio" : "otro"}`;
      div.innerHTML = `
        <span class="usuario">${usuario}</span>
        <div>${texto}</div>
        <span class="hora">${hora}</span>
      `;
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
    }

    function agregarSistema(texto) {
      const div = document.createElement("div");
      div.className = "sistema";
      div.textContent = texto;
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
    }

    function obtenerHoraActual() {
      const ahora = new Date();
      return ahora.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    document.getElementById("mensajeInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        enviarMensaje();
      }
    });
  </script>
</body>
</html>
