<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FSChat</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #fdf2f8);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #1f2937;
    }

    .app {
      width: 100%;
      max-width: 860px;
      height: 90vh;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    .header {
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
    }

    .estado {
      font-size: 14px;
      font-weight: bold;
      background: rgba(255,255,255,0.18);
      padding: 8px 12px;
      border-radius: 999px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: #f8fafc;
      border-bottom: 1px solid #e5e7eb;
    }

    .topbar input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      outline: none;
      font-size: 15px;
    }

    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: linear-gradient(to bottom, #f8fafc, #eff6ff);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sistema {
      align-self: center;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
    }

    .mensaje {
      max-width: 76%;
      padding: 12px 14px;
      border-radius: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      word-wrap: break-word;
    }

    .mensaje.mio {
      align-self: flex-end;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .mensaje.otro {
      align-self: flex-start;
      background: #ffffff;
      color: #111827;
      border: 1px solid #dbeafe;
      border-bottom-left-radius: 6px;
    }

    .usuario {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .hora {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      opacity: 0.8;
      text-align: right;
    }

    .barra-envio {
      padding: 16px;
      background: #ffffff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
    }

    .fila-controles {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .icon-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-size: 20px;
      background: #eef2ff;
      color: #3730a3;
      transition: 0.2s;
    }

    .icon-btn:hover {
      background: #ddd6fe;
    }

    #mensajeInput {
      flex: 1;
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 16px;
      outline: none;
      font-size: 15px;
      background: #f8fafc;
    }

    .btn-enviar {
      padding: 0 22px;
      height: 46px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-enviar:hover {
      opacity: 0.92;
    }

    .emoji-panel {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }

    .emoji {
      font-size: 24px;
      cursor: pointer;
      padding: 6px;
      border-radius: 10px;
    }

    .emoji:hover {
      background: #e0e7ff;
    }

    .mensaje img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 6px;
    }

    .mensaje video {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 6px;
    }

    .archivo-box {
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.16);
    }

    .mensaje.otro .archivo-box {
      background: #eff6ff;
    }

    .archivo-box a {
      color: inherit;
      font-weight: bold;
      text-decoration: underline;
    }

    .nota {
      font-size: 12px;
      color: #64748b;
      padding-left: 4px;
    }

    @media (max-width: 700px) {
      .app {
        height: 95vh;
        border-radius: 18px;
      }

      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .mensaje {
        max-width: 92%;
      }

      .fila-controles {
        flex-wrap: wrap;
      }

      #mensajeInput {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>FSChat</h1>
      <div class="estado" id="estadoConexion">● Conectando...</div>
    </div>

    <div class="topbar">
      <input type="text" id="nombreInput" placeholder="Escribe tu nombre" />
    </div>

    <div id="mensajes">
      <div class="sistema">Bienvenido a FSChat</div>
    </div>

    <div class="barra-envio">
      <div id="emojiPanel" class="emoji-panel">
        <span class="emoji">😀</span>
        <span class="emoji">😂</span>
        <span class="emoji">😍</span>
        <span class="emoji">🥹</span>
        <span class="emoji">😎</span>
        <span class="emoji">🔥</span>
        <span class="emoji">❤️</span>
        <span class="emoji">👍</span>
        <span class="emoji">👀</span>
        <span class="emoji">🎉</span>
        <span class="emoji">😔</span>
        <span class="emoji">🤝</span>
        <span class="emoji">🙏</span>
        <span class="emoji">💯</span>
        <span class="emoji">✨</span>
      </div>

      <div class="fila-controles">
        <button class="icon-btn" id="emojiBtn" title="Emojis">😊</button>
        <button class="icon-btn" id="adjuntarBtn" title="Adjuntar archivo">📎</button>
        <input type="file" id="archivoInput" hidden />
        <input type="text" id="mensajeInput" placeholder="Escribe un mensaje..." />
        <button class="btn-enviar" onclick="enviarMensaje()">Enviar</button>
      </div>

      <div class="nota">Se recomiendan imágenes, videos cortos y archivos pequeños.</div>
    </div>
  </div>

  <script>
    const brokerUrl = "wss://broker.hivemq.com:8884/mqtt";
    const topic = "fschatsala/general";

    const client = mqtt.connect(brokerUrl);
    const mensajes = document.getElementById("mensajes");
    const estadoConexion = document.getElementById("estadoConexion");
    const mensajeInput = document.getElementById("mensajeInput");
    const nombreInput = document.getElementById("nombreInput");
    const emojiBtn = document.getElementById("emojiBtn");
    const emojiPanel = document.getElementById("emojiPanel");
    const archivoInput = document.getElementById("archivoInput");
    const adjuntarBtn = document.getElementById("adjuntarBtn");

    client.on("connect", () => {
      estadoConexion.textContent = "● Conectado";
      agregarSistema("Conectado al servidor MQTT");
      client.subscribe(topic);
    });

    client.on("error", () => {
      estadoConexion.textContent = "● Error";
    });

    client.on("message", (topic, message) => {
      try {
        const data = JSON.parse(message.toString());
        const miNombre = nombreInput.value.trim();
        const esMio = data.usuario === miNombre;
        renderMensaje(data, esMio);
      } catch (e) {
        agregarSistema("Llegó un mensaje no válido");
      }
    });

    function enviarMensaje() {
      const nombre = nombreInput.value.trim();
      const texto = mensajeInput.value.trim();

      if (!nombre) {
        alert("Primero escribe tu nombre");
        return;
      }

      if (!texto) return;

      const payload = {
        tipo: "texto",
        usuario: nombre,
        texto: texto,
        hora: obtenerHoraActual()
      };

      client.publish(topic, JSON.stringify(payload));
      mensajeInput.value = "";
    }

    emojiBtn.addEventListener("click", () => {
      emojiPanel.style.display = emojiPanel.style.display === "flex" ? "none" : "flex";
    });

    document.querySelectorAll(".emoji").forEach(emoji => {
      emoji.addEventListener("click", () => {
        mensajeInput.value += emoji.textContent;
        mensajeInput.focus();
      });
    });

    adjuntarBtn.addEventListener("click", () => {
      archivoInput.click();
    });

    archivoInput.addEventListener("change", () => {
      const archivo = archivoInput.files[0];
      if (!archivo) return;

      const nombre = nombreInput.value.trim();
      if (!nombre) {
        alert("Primero escribe tu nombre");
        archivoInput.value = "";
        return;
      }

      const maxSize = 700 * 1024;
      if (archivo.size > maxSize) {
        alert("El archivo es muy grande. Usa uno menor a 700 KB.");
        archivoInput.value = "";
        return;
      }

      const reader = new FileReader();

      reader.onload = function(e) {
        const base64 = e.target.result;

        let tipo = "archivo";
        if (archivo.type.startsWith("image/")) tipo = "imagen";
        else if (archivo.type.startsWith("video/")) tipo = "video";

        const payload = {
          tipo: tipo,
          usuario: nombre,
          nombreArchivo: archivo.name,
          mimeType: archivo.type,
          contenido: base64,
          hora: obtenerHoraActual()
        };

        client.publish(topic, JSON.stringify(payload));
      };

      reader.readAsDataURL(archivo);
      archivoInput.value = "";
    });

    function renderMensaje(data, esMio) {
      const div = document.createElement("div");
      div.className = `mensaje ${esMio ? "mio" : "otro"}`;

      let contenidoHTML = `
        <span class="usuario">${escapeHTML(data.usuario || "Usuario")}</span>
      `;

      if (data.tipo === "texto") {
        contenidoHTML += `<div>${escapeHTML(data.texto || "")}</div>`;
      } else if (data.tipo === "imagen") {
        contenidoHTML += `
          <div>📷 ${escapeHTML(data.nombreArchivo || "Imagen")}</div>
          <img src="${data.contenido}" alt="imagen enviada">
        `;
      } else if (data.tipo === "video") {
        contenidoHTML += `
          <div>🎥 ${escapeHTML(data.nombreArchivo || "Video")}</div>
          <video controls src="${data.contenido}"></video>
        `;
      } else if (data.tipo === "archivo") {
        contenidoHTML += `
          <div class="archivo-box">
            📎 Archivo: ${escapeHTML(data.nombreArchivo || "archivo")}
            <br>
            <a href="${data.contenido}" download="${escapeHTML(data.nombreArchivo || "archivo")}">Descargar</a>
          </div>
        `;
      }

      contenidoHTML += `<span class="hora">${escapeHTML(data.hora || obtenerHoraActual())}</span>`;
      div.innerHTML = contenidoHTML;

      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
    }

    function agregarSistema(texto) {
      const div = document.createElement("div");
      div.className = "sistema";
      div.textContent = texto;
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
    }

    function obtenerHoraActual() {
      const ahora = new Date();
      return ahora.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }

    function escapeHTML(texto) {
      return texto
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    mensajeInput.addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        enviarMensaje();
      }
    });
  </script>
</body>
</html>
